<!DOCTYPE html>
<html>
<head>
    <title>DreamScape Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>✨ DreamScape Gallery ✨</h1>
    <p>Explore the beauty of nature through images</p>
</header>


<div class="buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('animals')">Animals</button>
    <button onclick="filterImages('city')">City</button>
</div>


<section class="gallery">


<div class="card nature">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470"
onclick="openLightbox(this)">
<h3>Mountain View</h3>
</div>


<div class="card nature">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
onclick="openLightbox(this)">
<h3>Forest Beauty</h3>
</div>


<div class="card nature">
<img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e"
onclick="openLightbox(this)">
<h3>Green Valley</h3>
</div>


<div class="card animals">
<img src="https://images.unsplash.com/photo-1549366021-9f761d450615"
onclick="openLightbox(this)">
<h3>Wild Elephant</h3>
</div>


<div class="card animals">
<img src="https://images.unsplash.com/photo-1517849845537-4d257902454a"
onclick="openLightbox(this)">
<h3>Cute Dog</h3>
</div>


<div class="card animals">
<img src="https://images.unsplash.com/photo-1557050543-4d5f4e07ef46"
onclick="openLightbox(this)">
<h3>Wild Tiger</h3>
</div>


<div class="card city">
<img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df"
onclick="openLightbox(this)">
<h3>City Lights</h3>
</div>


<div class="card city">
<img src="https://images.unsplash.com/photo-1444723121867-7a241cacace9"
onclick="openLightbox(this)">
<h3>Modern City</h3>
</div>


<div class="card city">
<img src="https://images.unsplash.com/photo-1519501025264-65ba15a82390"
onclick="openLightbox(this)">
<h3>Night City</h3>
</div>


</section>



<!-- Lightbox -->

<div id="lightbox">

<span onclick="closeLightbox()">×</span>

<button onclick="previousImage()">❮</button>

<img id="largeImage">

<button onclick="nextImage()">❯</button>

</div>


<script src="script.js"></script>

</body>
</html>
