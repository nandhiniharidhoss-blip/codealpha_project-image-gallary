<!DOCTYPE html>
<html>
<head>
    <title>Nature Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Beautiful Image Gallery</h1>

<div class="buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('animals')">Animals</button>
    <button onclick="filterImages('world')">World</button>
</div>


<div class="gallery">

    <img src="images/mountain.jpg" data-category="nature" onclick="openLightbox(0)" alt="Mountain">
    <img src="images/beach.jpg" data-category="nature" onclick="openLightbox(1)" alt="Beach">
    <img src="images/forest.jpg" data-category="nature" onclick="openLightbox(2)" alt="Forest">
    <img src="images/waterfall.jpg" data-category="nature" onclick="openLightbox(3)" alt="Waterfall">
    <img src="images/desert.jpg" data-category="nature" onclick="openLightbox(4)" alt="Desert">

    <img src="images/city.jpg" data-category="world" onclick="openLightbox(5)" alt="City">
    <img src="images/river.jpg" data-category="nature" onclick="openLightbox(6)" alt="River">
    <img src="images/lake.jpg" data-category="nature" onclick="openLightbox(7)" alt="Lake">

    <img src="images/flower.jpg" data-category="nature" onclick="openLightbox(8)" alt="Flower">
    <img src="images/butterfly.jpg" data-category="animals" onclick="openLightbox(9)" alt="Butterfly">

    <img src="images/elephant.jpg" data-category="animals" onclick="openLightbox(10)" alt="Elephant">
    <img src="images/tiger.jpg" data-category="animals" onclick="openLightbox(11)" alt="Tiger">
    <img src="images/bird.jpg" data-category="animals" onclick="openLightbox(12)" alt="Bird">

    <img src="images/ocean.jpg" data-category="nature" onclick="openLightbox(13)" alt="Ocean">
    <img src="images/sunset.jpg" data-category="world" onclick="openLightbox(14)" alt="Sunset">

    <img src="images/snow.jpg" data-category="nature" onclick="openLightbox(15)" alt="Snow">
    <img src="images/space.jpg" data-category="world" onclick="openLightbox(16)" alt="Space">

    <img src="images/galaxy.jpg" data-category="world" onclick="openLightbox(17)" alt="Galaxy">
    <img src="images/castle.jpg" data-category="world" onclick="openLightbox(18)" alt="Castle">

    <img src="images/bridge.jpg" data-category="world" onclick="openLightbox(19)" alt="Bridge">

</div>


<div id="lightbox">

    <span onclick="closeLightbox()">×</span>

    <img id="lightbox-img">

    <button onclick="previous()">❮</button>
    <button onclick="next()">❯</button>

</div>


<script src="script.js"></script>

</body>
</html>
