<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<header>
<h1>Responsive Image Gallery</h1>
<p>HTML • CSS • JavaScript</p>
</header>

<div class="buttons">
<button class="active" onclick="filterSelection('all')">All</button>
<button onclick="filterSelection('nature')">Nature</button>
<button onclick="filterSelection('animals')">Animals</button>
<button onclick="filterSelection('city')">City</button>
</div>

<div class="gallery">

<div class="image nature">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600" onclick="openLightbox(0)">
</div>

<div class="image animals">
<img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=600" onclick="openLightbox(1)">
</div>

<div class="image city">
<img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=600" onclick="openLightbox(2)">
</div>

<div class="image nature">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=600" onclick="openLightbox(3)">
</div>

<div class="image animals">
<img src="https://images.unsplash.com/photo-1501706362039-c6e80948d5f3?w=600" onclick="openLightbox(4)">
</div>

<div class="image city">
<img src="https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=600" onclick="openLightbox(5)">
</div>

<div class="image nature">
<img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600" onclick="openLightbox(6)">
</div>

<div class="image animals">
<img src="https://images.unsplash.com/photo-1518717758536-85ae29035b6d?w=600" onclick="openLightbox(7)">
</div>

<div class="image city">
<img src="https://images.unsplash.com/photo-1494526585095-c41746248156?w=600" onclick="openLightbox(8)">
</div>

</div>

<div id="lightbox">

<span class="close" onclick="closeLightbox()">&times;</span>

<span class="prev" onclick="changeImage(-1)">&#10094;</span>

<img id="lightbox-img">

<span class="next" onclick="changeImage(1)">&#10095;</span>

</div>

<script src="script.js"></script>

</body>
</html>
